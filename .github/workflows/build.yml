name: Flutter Web Deploy and APK Build

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ١. بەشی وێب - هەمیشە کار دەکات
  deploy-web:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
    - name: Create Web Folder
      run: flutter create . --platforms=web
    - name: Install dependencies
      run: flutter pub get
    - name: Build Web
      run: flutter build web --base-href "/${{ github.event.repository.name }}/"
    - name: Upload Web Artifacts
      uses: actions/upload-pages-artifact@v3
      with:
        path: build/web
    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v4

  # ٢. بەشی APK - تەنها کاتێک کار دەکات کە بنووسیت apkw
  build-apk:
    if: contains(github.event.head_commit.message, 'apkw')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        
    - name: Recreate Android Folder
      run: |
        flutter create . --platforms=android

    - name: Force Android SDK 34
      run: |
        cat << 'SUBEOF' >> android/build.gradle
        subprojects {
            afterEvaluate { project ->
                if (project.hasProperty("android")) {
                    project.android {
                        compileSdkVersion 34
                        defaultConfig {
                            targetSdkVersion 34
                        }
                    }
                }
            }
        }
        SUBEOF

    - name: Install dependencies
      run: flutter pub get

    - name: Build APK
      run: flutter build apk --split-per-abi --release --no-tree-shake-icons

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-apks
        path: build/app/outputs/flutter-apk/*.apk
