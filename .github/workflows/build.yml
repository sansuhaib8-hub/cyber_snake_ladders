name: Flutter Web Deploy and APK Build

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ١. بەشی وێب
  deploy-web:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
    - name: Create Web Folder
      run: flutter create . --platforms=web
    - name: Install dependencies
      run: flutter pub get
    - name: Build Web
      run: flutter build web --base-href "/${{ github.event.repository.name }}/"
    - name: Upload Web Artifacts
      uses: actions/upload-pages-artifact@v3
      with:
        path: build/web
    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v4

  # ٢. بەشی APK (لەگەڵ ناچارکردنی کۆمپاڵ بۆ Android 34)
  build-apk:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Recreate Android Folder
      run: |
        flutter create . --platforms=android
        
    - name: Force Compile SDK to 34
      run: |
        # گۆڕینی وەشانی compileSdkVersion لە ناو فایلی build.gradle ی ئاندرۆیددا بۆ ٣٤
        sed -i 's/compileSdkVersion .*/compileSdkVersion 34/g' android/app/build.gradle
        sed -i 's/targetSdkVersion .*/targetSdkVersion 34/g' android/app/build.gradle
        
        # ئەگەر فڵاتەری نوێ فۆرماتەکەی گۆڕیبێت بۆ flutter.compileSdkVersion، ئەمە جێگیر دەکات
        echo "flutter.compileSdkVersion=34" >> android/local.properties
        echo "flutter.targetSdkVersion=34" >> android/local.properties

    - name: Install dependencies
      run: flutter pub get

    - name: Build APK
      run: flutter build apk --split-per-abi --release

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-apks
        path: build/app/outputs/flutter-apk/*.apk
