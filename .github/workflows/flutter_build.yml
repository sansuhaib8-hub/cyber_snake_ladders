name: Flutter Web Deploy and APK Build

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ١. بەشی وێب - هەمیشە کار دەکات
  deploy-web:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        flutter-version: '3.x'
    
    - name: Create Web Folder
      run: flutter create . --platforms=web
    
    - name: Install dependencies
      run: flutter pub get
    
    - name: Build Web
      run: flutter build web --release --base-href "/${{ github.event.repository.name }}/"
    
    - name: Upload Web Artifacts
      uses: actions/upload-pages-artifact@v3
      with:
        path: build/web
    
    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v4

  # ٢. بەشی APK - تەنها لەگەڵ apkw کار دەکات
  build-apk:
    if: contains(github.event.head_commit.message, 'apkw')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        flutter-version: '3.x'
        
    - name: Recreate Android Project
      run: |
        flutter create . --platforms=android
        if [ -f android/app/src/main/AndroidManifest.xml ]; then
          sed -i '/flutterEmbedding/d' android/app/src/main/AndroidManifest.xml
        fi

    - name: Force Android SDK 34
      run: |
        cat >> android/build.gradle << 'GRADLEEOF'

subprojects {
    project.plugins.withType(com.android.build.gradle.BasePlugin).configureEach {
        project.android {
            compileSdkVersion 34
            defaultConfig {
                minSdkVersion 21
                targetSdkVersion 34
            }
        }
    }
}
GRADLEEOF

    - name: Install dependencies
      run: flutter pub get
      
    - name: Build APK
      run: flutter build apk --release --split-per-abi
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: build/app/outputs/flutter-apk/
